<!--
    PÁGINA HIJA: página de error genérica
    Spring Boot detecta automáticamente templates/error.html y le pasa:
      ${status}  → código HTTP (404, 500, etc.)
      ${error}   → nombre del error ("Not Found", "Internal Server Error", etc.)
      ${message} → mensaje de detalle
-->
<html th:replace="~{layout :: layout(~{::content}, ~{::title}, _)}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - BiblioBox</title>
</head>
<body>

<th:block th:fragment="content">
<div class="container">
    <div class="col-md-6 mx-auto text-center mt-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <!-- th:text con ?: para mostrar el código de error si existe, o "Error" por defecto -->
                <h3 class="mb-0">
                    <i class="bi bi-exclamation-octagon-fill me-2"></i>
                    Error <span th:text="${status ?: ''}"></span>
                </h3>
            </div>
            <div class="card-body">
                <!-- Spring Boot pasa estas variables automáticamente a la vista error.html -->
                <p class="lead" th:text="${error ?: 'Ha ocurrido un error inesperado.'}"></p>
                <p class="text-muted" th:text="${message ?: ''}"></p>
                <a th:href="@{/}" class="btn btn-primary mt-3">
                    <i class="bi bi-house me-1"></i>Volver al inicio
                </a>
            </div>
        </div>
    </div>
</div>
</th:block>

</body>
</html>
