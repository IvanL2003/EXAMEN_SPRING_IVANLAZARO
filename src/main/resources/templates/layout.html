<!DOCTYPE html>
<!--
    LAYOUT MAESTRO (layout.html)
    ════════════════════════════════════════════════════════════════════════════
    Contiene el HTML base completo. Las páginas hijas lo invocan con:

      <html th:replace="~{layout :: layout(~{::content}, ~{::title}, ~{::scripts})}">

    El th:fragment="layout(content, pageTitle, scripts)" en el <html>
    recibe los fragments de la hija como parámetros y los inserta con th:insert.
-->
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, pageTitle, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5.3.8 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons 1.11.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--
        th:insert en vez de th:replace para el título:
        inserta el contenido del fragment <title> de la hija SIN sustituir esta etiqueta.
    -->
    <title th:insert="${pageTitle}">BiblioBox</title>
</head>
<body class="bg-light">

    <!-- ── NAVBAR ──────────────────────────────────────────────────────────
         Cargado desde fragments/navbar.html.
         Ninguna página hija necesita navbar propio.
    -->
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <!-- ── CONTENIDO DE LA PÁGINA HIJA ─────────────────────────────────────
         th:insert="${content}" inyecta aquí el th:fragment="content"
         que define cada página hija, dentro de este div contenedor.
    -->
    <div th:insert="${content}"></div>

    <!-- Bootstrap 5.3.8 JS Bundle (incluye Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ── SCRIPTS ADICIONALES ───────────────────────────────────────────────
         Las páginas que necesiten JS extra (Chart.js, etc.) definen
         th:fragment="scripts". Las que no, pasan _ (nulo).
    -->
    <th:block th:insert="${scripts}"></th:block>

    <!-- Pequeño script para marcar el enlace activo en la navbar sin usar objetos de Request en Thymeleaf -->
    <script>
        (function(){
            try {
                const path = window.location.pathname || '/';
                document.querySelectorAll('.navbar .nav-link').forEach(a => {
                    // comparar inicio de ruta para marcar secciones (ej: /alumnos -> /alumnos/3)
                    const href = a.getAttribute('href') || a.getAttribute('th:href');
                    if (!href) return;
                    // Si el href es una URL absoluta o contiene parámetros, usar startsWith simple
                    if (path.startsWith(href)) {
                        a.classList.add('active');
                    }
                });
            } catch (e) { /* no bloquear si hay error */ }
        })();
    </script>

</body>
</html>
