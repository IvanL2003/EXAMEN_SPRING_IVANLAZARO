<!--
    PÁGINA HIJA: detalle de un alumno con sus préstamos
-->
<html th:replace="~{layout :: layout(~{::content}, ~{::title}, _)}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${alumno.nombre} + ' - BiblioBox'">Detalle Alumno - BiblioBox</title>
</head>
<body>

<th:block th:fragment="content">
<div class="container">

    <!-- Ficha del alumno -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="bi bi-person-fill me-2"></i>
                <span th:text="${alumno.nombre}"></span>
            </h4>
            <div>
                <a th:href="@{/alumnos/edit/{id}(id=${alumno.id})}" class="btn btn-sm btn-warning me-1">
                    <i class="bi bi-pencil me-1"></i>Editar
                </a>
                <a th:href="@{/alumnos}" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>
        </div>
        <div class="card-body">
            <!-- dl/dt/dd es el patrón semántico para mostrar pares clave-valor -->
            <dl class="row mb-0">
                <dt class="col-sm-3">ID</dt>
                <dd class="col-sm-9" th:text="${alumno.id}"></dd>

                <dt class="col-sm-3">Nombre</dt>
                <dd class="col-sm-9" th:text="${alumno.nombre}"></dd>

                <dt class="col-sm-3">Curso</dt>
                <dd class="col-sm-9">
                    <span class="badge bg-primary" th:text="${alumno.curso}"></span>
                </dd>

                <dt class="col-sm-3">Email</dt>
                <!-- ?: operador Elvis de Thymeleaf: muestra '-' si el campo es null -->
                <dd class="col-sm-9" th:text="${alumno.email ?: '-'}"></dd>

                <dt class="col-sm-3">Total préstamos</dt>
                <dd class="col-sm-9">
                    <span class="badge bg-secondary" th:text="${#lists.size(alumno.prestamos)}"></span>
                </dd>
            </dl>
        </div>
    </div>

    <!-- Tabla de préstamos del alumno -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5>
            <i class="bi bi-book me-1"></i>
            Préstamos de <span th:text="${alumno.nombre}"></span>
        </h5>
        <a th:href="@{/prestamos/new}" class="btn btn-sm btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nuevo préstamo
        </a>
    </div>

    <table class="table table-bordered bg-white">
        <thead class="table-primary">
            <tr>
                <th>Libro</th>
                <th>Fecha Préstamo</th>
                <th>Estado</th>
                <th>Fecha Devolución</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(alumno.prestamos)}">
                <td colspan="5" class="text-center text-muted">Este alumno no tiene préstamos.</td>
            </tr>
            <!-- th:each itera la lista de préstamos de ESTE alumno (relación @OneToMany) -->
            <tr th:each="prestamo : ${alumno.prestamos}">
                <td th:text="${prestamo.tituloLibro}"></td>
                <td th:text="${prestamo.fechaPrestamo}"></td>
                <td>
                    <!-- th:if / th:unless muestran uno u otro badge según el booleano -->
                    <span th:if="${prestamo.devuelto}"     class="badge bg-success">Devuelto</span>
                    <span th:unless="${prestamo.devuelto}" class="badge bg-warning text-dark">Pendiente</span>
                </td>
                <td th:text="${prestamo.fechaDevolucion != null ? prestamo.fechaDevolucion : '-'}"></td>
                <td>
                    <a th:href="@{/prestamos/{id}(id=${prestamo.id})}"      class="btn btn-sm btn-info">
                        <i class="bi bi-eye"></i>
                    </a>
                    <a th:href="@{/prestamos/edit/{id}(id=${prestamo.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</th:block>

</body>
</html>
