# ============================================================
# application-test.properties
# Se activa con @ActiveProfiles("test") en los tests E2E.
# Usa H2 en memoria para que los tests no toquen datos reales
# y sean completamente independientes del entorno.
# ============================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: crea las tablas al inicio del test y las borra al final
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# NO cargar import.sql en tests (cada test gestiona sus propios datos)
spring.sql.init.mode=never
# Evitar que Hibernate cargue automáticamente import.sql durante tests
spring.jpa.properties.hibernate.hbm2ddl.import_files=
